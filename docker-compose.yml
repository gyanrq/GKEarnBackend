services:
  postgres:
    image: postgres:16-alpine
    container_name: earnx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-earnx3_dev}
      POSTGRES_USER: ${DB_USER:-earnx_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-earnx_user} -d ${DB_NAME:-earnx3_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: earnx-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ]; then
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earnx-backend
    restart: unless-stopped
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-earnx3_dev}
      DB_USER: ${DB_USER:-earnx_user}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-prod-min32}
      MAIL_USERNAME: ${MAIL_USERNAME:-dev@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      SMS_PROVIDER_ENABLED: ${SMS_PROVIDER_ENABLED:-false}
      RAZORPAY_PAYOUT_ENABLED: ${RAZORPAY_PAYOUT_ENABLED:-false}
      UPLOAD_DIR: /app/uploads
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  app_uploads:
