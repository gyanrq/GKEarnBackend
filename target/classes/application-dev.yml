# ─────────────────────────────────────────────────────────────────────────────
# DEV profile — safe defaults for local development ONLY.
# Never commit real secrets here. All sensitive values come from .env or IDE
# environment variables. Copy .env.example → .env and fill in your values.
# ─────────────────────────────────────────────────────────────────────────────
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # In dev, start Redis with: docker run -d -p 6379:6379 redis:7-alpine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:earnx3_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:changeme}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    username: ${MAIL_USERNAME:dev@example.com}
    password: ${MAIL_PASSWORD:changeme}

logging:
  level:
    com.myworld: DEBUG
    org.hibernate.SQL: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-prod-min32}

  otp:
    bypass-in-dev: true

  referral:
    bonus-credits: 100          # credits awarded to referrer on successful referral
    referred-bonus-credits: 50  # credits awarded to referred user on first email verification

  campaign:
    max-daily-leads-per-user: 5

  upload:
    dir: ${UPLOAD_DIR:uploads}
    base-url: http://localhost:8080/api/files

# Razorpay (disabled in dev)
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  account-number: ${RAZORPAY_ACCOUNT_NUMBER:}
  payout:
    enabled: false
