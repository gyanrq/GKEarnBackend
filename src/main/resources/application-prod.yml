# ─────────────────────────────────────────────────────────────────────────────
# PROD profile — all sensitive values from env vars, no hardcoded fallbacks.
# Redis is OPTIONAL — app falls back to Caffeine if Redis is unavailable.
# ─────────────────────────────────────────────────────────────────────────────
spring:
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      leak-detection-threshold: 60000
      pool-name: EarnXHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    root: WARN
    com.myworld: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 0.1

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRY_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  referral:
    bonus-credits: ${REFERRAL_BONUS_CREDITS:100}
    referred-bonus-credits: ${REFERRED_BONUS_CREDITS:50}
  campaign:
    max-daily-leads-per-user: ${MAX_DAILY_LEADS_PER_USER:5}

  upload:
    dir: ${UPLOAD_DIR:/home/ubuntu/uploads}
    base-url: ${APP_BASE_URL:https://api.gkearn.online}/api/files

server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d+\.\d+\.\d+|172\.\d+\.\d+\.\d+|192\.168\.\d+\.\d+|127\.0\.0\.1
    threads:
      max: 20
      min-spare: 5

razorpay:
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:change-me-in-prod}
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  account-number: ${RAZORPAY_ACCOUNT_NUMBER:}
  payout:
    enabled: ${RAZORPAY_PAYOUT_ENABLED:false}

sms:
  provider:
    enabled: ${SMS_PROVIDER_ENABLED:false}
  msg91:
    auth-key: ${SMS_MSG91_AUTH_KEY:}
    template-id: ${SMS_MSG91_TEMPLATE_ID:}
    sender-id: ${SMS_MSG91_SENDER_ID:EARNXX}
